<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Регистрация</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#08142c]">

<div class="relative w-[1440px] h-[1024px] mx-auto overflow-hidden">


  <img
    src="https://cdn.animaapp.com/projects/69a6e924fc309ba5acbb5799/releases/69a6e95dcc961016d1db2ed5/img/--------------9--1.png"
    class="absolute top-0 left-[-200px] w-[1893px] h-[1025px] object-cover"
  />


  <div class="absolute top-[117px] left-[161px] w-[1080px] h-[733px] bg-white rounded-[45px] border border-black shadow-xl">

    <span class="absolute top-[42px] left-[226px] text-[48px] text-black">
      Регистрация участника
    </span>

    <label class="absolute top-[147px] left-[120px] text-[48px] text-black">
      Имя
    </label>

    <input
      type="text"
      class="absolute top-[230px] left-[120px] w-[840px] h-[70px] bg-[#1d378d] text-white text-[32px] px-4 outline-none"
    />

    <label class="absolute top-[356px] left-[120px] text-[48px] text-black">
      Email
    </label>

    <input
      type="email"
      class="absolute top-[430px] left-[120px] w-[840px] h-[70px] bg-[#1d378d] text-white text-[32px] px-4 outline-none"
    />

    <button
      class="absolute bottom-[60px] left-[50%] translate-x-[-50%] w-[393px] h-[90px] bg-[#1d378d] text-[48px] text-white flex items-center justify-center hover:bg-[#162a6b] active:scale-95 transition"
    >
      Записаться
    </button>

  </div>

</div>

</body>
</html>
